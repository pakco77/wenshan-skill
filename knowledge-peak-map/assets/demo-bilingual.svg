    <text x="206" y="347" text-anchor="middle" class="count" fill="#735633">35篇</text><path d="M206 357l9 19h-18Z" fill="#62492f"/><text x="206" y="393" text-anchor="middle" class="domain">AI工具 · 证据域</text><text x="206" y="417" text-anchor="middle" class="mountain">摩擦决定采用</text><text x="206" y="435" text-anchor="middle" class="answer">能嵌入工作流，比功能最强更重要。</text>
    <text x="340" y="202" text-anchor="middle" class="count" fill="#3f6e65">13篇</text><path d="M340 212l9 19h-18Z" fill="#365e56"/><text x="340" y="248" text-anchor="middle" class="domain">AI认知 · 证据域</text><text x="340" y="272" text-anchor="middle" class="mountain">能力普及，判断升值</text><text x="340" y="290" text-anchor="middle" class="answer">通用能力越便宜，真实判断越稀缺。</text>
