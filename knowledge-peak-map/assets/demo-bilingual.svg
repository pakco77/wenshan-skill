<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">文山.skill 与 Wenshan.skill 双语效果 Demo</title>
  <desc id="desc">同一组知识山在中文和英文界面中的对照，文章证据、篇数和等高线保持一致。</desc>
  <defs>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#c8cbc3" stroke-width="1" opacity=".32"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <style>
      .brand{font:650 27px -apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;fill:#202621;letter-spacing:1px}
      .slogan{font:400 13px -apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;fill:#626960}
      .user{font:650 13px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#313832;letter-spacing:1px}
      .stat{font:650 14px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#313832}
      .mountain{font:650 20px -apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;fill:#252c27}
      .mountain-en{font:650 14px -apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;fill:#252c27}
      .domain{font:600 8px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#697069;letter-spacing:.7px}
      .answer{font:400 9px -apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;fill:#555e57}
      .count{font:650 13px ui-monospace,SFMono-Regular,Menlo,monospace}
      .contour-a{fill:none;stroke:#8c7350;stroke-width:1.5;opacity:.72}
      .contour-b{fill:none;stroke:#54776f;stroke-width:1.5;opacity:.72}
      .contour-c{fill:none;stroke:#805d58;stroke-width:1.5;opacity:.72}
      .dot{fill:#3f5149;stroke:#efede6;stroke-width:1.5}
    </style>
  </defs>
  <rect width="1200" height="900" fill="#cbc9c1"/>
  <text x="60" y="56" class="user">BILINGUAL OUTPUT · SAME EVIDENCE</text>
  <text x="1140" y="56" text-anchor="end" class="user">54 PIECES · 3 PEAKS</text>

